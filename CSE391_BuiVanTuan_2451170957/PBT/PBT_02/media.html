<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia</title>
</head>
<body>
    <h1>Giới thiệu sản phẩm</h1>
    <section>
        <h2>Hình ảnh sản phẩm</h2>

        <figure>
            <img src="screenshots/444965480.jpeg"
                 alt="Sản phẩm 1 - điện thoại thông minh"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>Điện thoại thông minh cao cấp</figcaption>
        </figure>

        <figure>
            <img src="screenshots/dong-ho-thong-minh-mibro-t1.jpg"
                 alt="Sản phẩm 2 - tai nghe không dây"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>Tai nghe không dây chất lượng cao</figcaption>
        </figure>

        <figure>
            <img src="screenshots/ngoaihinhairpodspro_1280x720-800-resize.jpg"
                 alt="Sản phẩm 3 - đồng hồ thông minh"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>Đồng hồ thông minh hiện đại</figcaption>
        </figure>
    </section>

    <section>
        <h2>Video giới thiệu (YouTube)</h2>
        <iframe width="560" height="315"
            src="https://youtu.be/EYGJ8cKm1PQ?si=iaReZjXgO7Xz7Lo7"
            title="Video giới thiệu sản phẩm"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </section>

    <section>
        <h2>Video demo sản phẩm</h2>
        <video controls poster="https://youtu.be/EYGJ8cKm1PQ?si=iaReZjXgO7Xz7Lo7" width="500">
            <source src="video.mp4" type="video/mp4">
            <source src="video.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ video.
        </video>
    </section>

    <section>
        <h2>Nhạc nền</h2>
        <audio controls>
            <source src="audio.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ audio.
        </audio>
    </section>

    <section>
        <h2>Logo (SVG)</h2>
        <svg width="100" height="100">
            <circle cx="50" cy="50" r="40" fill="blue" />
        </svg>
    </section>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>

    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <!-- ====================== -->
    <!-- NAVBAR -->
    <!-- ====================== -->

    <header class="navbar">

        <div class="logo">
            LOGO
        </div>

        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
        </nav>

        <div class="auth-buttons">
            <button>Login</button>
            <button>Register</button>
        </div>

    </header>

    <!-- ====================== -->
    <!-- PRODUCT GRID -->
    <!-- ====================== -->

    <main class="products-container">

        <!-- CARD 1 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>Gaming Laptop</h3>

            <p class="price">$1200</p>

            <button>Mua</button>
        </div>

        <!-- CARD 2 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>Mechanical Keyboard</h3>

            <p class="price">$90</p>

            <button>Mua</button>
        </div>

        <!-- CARD 3 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>Gaming Mouse</h3>

            <p class="price">$40</p>

            <button>Mua</button>
        </div>

        <!-- CARD 4 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>Monitor 27 Inch</h3>

            <p class="price">$300</p>

            <button>Mua</button>
        </div>

        <!-- CARD 5 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>Headphone</h3>

            <p class="price">$80</p>

            <button>Mua</button>
        </div>

        <!-- CARD 6 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>Webcam HD</h3>

            <p class="price">$55</p>

            <button>Mua</button>
        </div>

        <!-- CARD 7 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>Gaming Chair</h3>

            <p class="price">$250</p>

            <button>Mua</button>
        </div>

        <!-- CARD 8 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250x180"
                 alt="Product">

            <h3>USB Microphone</h3>

            <p class="price">$110</p>

            <button>Mua</button>
        </div>

    </main>

</body>
</html>

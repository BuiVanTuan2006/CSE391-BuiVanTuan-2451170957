<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout E-Commerce</title>

    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <h1>MyShop</h1>
        </header>

        <!-- HERO -->
        <section class="hero">
            <div class="hero-content">
                <h2>BIG SALE 50%</h2>
                <p>Giảm giá cực mạnh cho toàn bộ sản phẩm gaming.</p>
            </div>

            <!-- Bonus -->
            <div class="featured-product">
                ⭐ Sản phẩm nổi bật
            </div>
        </section>

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>Bộ lọc</h2>

            <label>
                <input type="checkbox">
                Laptop
            </label>

            <label>
                <input type="checkbox">
                Gaming
            </label>

            <label>
                <input type="checkbox">
                Keyboard
            </label>

            <label>
                <input type="checkbox">
                Mouse
            </label>

        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Gaming Laptop</h3>
                <p>$1200</p>
                <button>Mua ngay</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Gaming Mouse</h3>
                <p>$50</p>
                <button>Mua ngay</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Mechanical Keyboard</h3>
                <p>$90</p>
                <button>Mua ngay</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Monitor 27 Inch</h3>
                <p>$300</p>
                <button>Mua ngay</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Gaming Chair</h3>
                <p>$250</p>
                <button>Mua ngay</button>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Headphone</h3>
                <p>$80</p>
                <button>Mua ngay</button>
            </div>

        </main>

        <!-- ADS -->
        <aside class="ads">

            <h2>Quảng cáo</h2>

            <img src="https://via.placeholder.com/180x400"
                 alt="Ads Banner">

        </aside>

        <!-- FOOTER -->
        <footer class="footer">
            <p>&copy; 2026 MyShop. All rights reserved.</p>
        </footer>

    </div>

</body>
</html>
